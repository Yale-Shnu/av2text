<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AV Transcription</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            color: #1a1a1a;
            min-height: 100vh;
            line-height: 1.5;
        }

        .wrap { max-width: 720px; margin: 0 auto; padding: 40px 20px; }

        /* 头部 */
        .header { margin-bottom: 36px; }
        .header h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.3px; }
        .header p { font-size: 13px; color: #888; margin-top: 6px; }

        /* 上传区域 */
        .upload-box {
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            background: #fff;
            transition: border-color .15s, background .15s;
        }
        .upload-box:hover { border-color: #aaa; background: #fafafa; }
        .upload-box.active { border-color: #222; background: #f5f5f5; }

        .upload-icon {
            width: 44px; height: 44px; margin: 0 auto 14px;
            border: 2px solid #ccc; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: #999;
        }
        .upload-title { font-size: 15px; color: #333; margin-bottom: 4px; }
        .upload-hint { font-size: 12px; color: #999; }
        #file-input { display: none; }

        .file-info {
            display: none; align-items: center; justify-content: space-between;
            margin-top: 14px; padding: 10px 14px; background: #f0f4ff;
            border-radius: 6px; font-size: 13px; color: #3b5998;
        }
        .file-info .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 10px; }
        .file-info .del { cursor: pointer; color: #999; font-weight: bold; }
        .file-info .del:hover { color: #e00; }

        /* 选项行 */
        .opts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 24px; }

        .opt label {
            display: block; font-size: 12px; font-weight: 500;
            color: #666; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px;
        }
        .opt select {
            width: 100%; padding: 10px 12px; border: 1px solid #e0e0e0;
            border-radius: 6px; font-size: 14px; background: #fff;
            outline: none; transition: border-color .15s;
        }
        .opt select:focus { border-color: #555; }

        /* 按钮 */
        .btn-go {
            width: 100%; margin-top: 24px; padding: 13px;
            background: #1a1a1a; color: #fff; border: none;
            border-radius: 8px; font-size: 15px; font-weight: 500;
            cursor: pointer; transition: opacity .15s, transform .08s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-go:hover:not(:disabled) { opacity: .88; }
        .btn-go:active:not(:disabled) { transform: scale(.99); }
        .btn-go:disabled { opacity: .5; cursor: not-allowed; }

        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,.3);
            border-top-color: #fff; border-radius: 50%;
            animation: spin .6s linear infinite; display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 进度 */
        .progress { margin-top: 18px; display: none; }
        .pg-bar { height: 3px; background: #eee; border-radius: 2px; overflow: hidden; }
        .pg-fill { height: 100%; background: #1a1a1a; width: 0; transition: width .2s; }
        .pg-text { text-align: center; font-size: 12px; color: #999; margin-top: 8px; }

        /* 错误 */
        .err {
            margin-top: 16px; padding: 12px 16px; background: #fef3f3;
            border-left: 3px solid #e00; border-radius: 0 6px 6px 0;
            font-size: 13px; color: #c00; display: none;
        }

        /* 结果 */
        .result { margin-top: 32px; display: none; }
        .result-head {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px; flex-wrap: wrap; gap: 10px;
        }
        .result-head h2 { font-size: 17px; font-weight: 600; }
        .acts { display: flex; gap: 8px; }
        .act-btn {
            padding: 7px 14px; border: 1px solid #ddd; border-radius: 6px;
            background: #fff; cursor: pointer; font-size: 13px; transition: all .15s;
        }
        .act-btn:hover { border-color: #999; background: #f9f9f9; }

        .meta { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
        .tag {
            font-size: 11px; color: #777; background: #f0f0f0;
            padding: 4px 10px; border-radius: 4px;
        }

        textarea.output {
            width: 100%; min-height: 220px; padding: 16px;
            border: 1px solid #e5e5e5; border-radius: 8px;
            font-size: 14px; line-height: 1.75; resize: vertical;
            font-family: inherit; background: #fafafa;
            outline: none; transition: border-color .15s;
        }
        textarea.output:focus { border-color: #bbb; }

        /* Toast */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
            padding: 10px 22px; background: #333; color: #fff;
            border-radius: 6px; font-size: 13px; opacity: 0;
            transition: all .25s ease; z-index: 999; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.ok { background: #16a34a; }
        .toast.fail { background: #dc2626; }

        @media(max-width:520px){
            .opts { grid-template-columns: 1fr; }
            .result-head { flex-direction: column; align-items: flex-start; }
            .acts { width: 100%; }
            .act-btn { flex: 1; justify-content: center; }
        }
    </style>
</head>
<body>
<div class="wrap">

    <div class="header">
        <h1>AV Transcription</h1>
        <p>Audio & Video to Text | 音频/视频转文本 by SHNUYL</p>
    </div>

    <!-- 上传 -->
    <div class="upload-box" id="up">
        <div class="upload-icon">+</div>
        <div class="upload-title">点击上传或拖拽文件到此处</div>
        <div class="upload-hint">支持 MP3 / MP4 / WAV / MOV / MKV 等，最大 500MB</div>
        <input type="file" id="file-input" accept="audio/*,video/*">
        <div class="file-info" id="file-info"><span class="name"></span><span class="del">&times;</span></div>
    </div>

    <!-- 选项 -->
    <div class="opts">
        <div class="opt">
            <label>模型</label>
            <select id="sel-model">
                <option value="tiny">Tiny (最快)</option>
                <option value="base" selected>Base (推荐)</option>
                <option value="small">Small</option>
                <option value="medium">Medium</option>
                <option value="large">Large (最准)</option>
            </select>
        </div>
        <div class="opt">
            <label>语言</label>
            <select id="sel-lang">
                <option value="">自动检测</option>
                <option value="zh" selected>中文</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="es">Español</option>
                <option value="ru">Русский</option>
                <option value="pt">Português</option>
                <option value="it">Italiano</option>
            </select>
        </div>
    </div>

    <!-- 提交 -->
    <button class="btn-go" id="btn-go"><span>开始转写</span><div class="spinner" id="spin"></div></button>

    <!-- 进度 -->
    <div class="progress" id="prog">
        <div class="pg-bar"><div class="pg-fill" id="fill"></div></div>
        <div class="pg-text">正在处理...</div>
    </div>

    <!-- 错误 -->
    <div class="err" id="err"></div>

    <!-- 结果 -->
    <div class="result" id="res">
        <div class="result-head">
            <h2>转录结果</h2>
            <div class="acts">
                <button class="act-btn" onclick="doCopy()">复制</button>
                <button class="act-btn" onclick="doDL('txt')">TXT</button>
                <button class="act-btn" onclick="doDL('srt')">SRT</button>
            </div>
        </div>
        <div class="meta" id="meta"></div>
        <textarea class="output" id="out" readonly></textarea>
    </div>

</div>

<div class="toast" id="toast"></div>

<script>
const $ = s => document.getElementById(s);
const up=$('up'), fi=$('file-input'), info=$('file-info'),
      btn=$('btn-go'), spin=$('spin'), prog=$('prog'), fill=$('fill'),
      res=$('res'), out=$('out'), meta=$('meta'), err=$('err'), toast=$('toast');
let curFile=null, rData=null;

up.onclick=()=>fi.click();
fi.onchange=pickFile;

['dragenter','dragover'].forEach(e=>up.addEventListener(e,ev=>{ev.preventDefault();up.classList.add('active')}));
['dragleave','drop'].forEach(e=>up.addEventListener(e,ev=>{ev.preventDefault();up.classList.remove('active')}));
up.addEventListener('drop',ev=>{
    ev.preventDefault(); up.classList.remove('active');
    if(ev.dataTransfer.files.length){fi.files=ev.dataTransfer.files;pickFile();}
});

function pickFile(){
    const f=fi.files[0];if(!f)return;
    curFile=f;
    info.querySelector('.name').textContent=f.name+' ('+fmtSize(f.size)+')';
    info.style.display='flex'; hideErr();
}
info.querySelector('.del').onclick=e=>{e.stopPropagation();curFile=null;fi.value='';info.style.display='none'};

btn.onclick=go;

async function go(){
    if(!curFile){showErr('请先选择文件');return}
    setLoading(true);hideErr();res.style.display='none';
    let p=0,timer=setInterval(()=>{if(p<90){p+=Math.random()*8;fill.style.width=Math.min(p,90)+'%'}},450);

    try{
        const fd=new FormData();
        fd.append('file',curFile);
        fd.append('model',$('sel-model').value);
        const L=$('sel-lang').value;if(L)fd.append('language',L);
        const resp=await fetch('/transcribe',{method:'POST',body:fd});
        clearInterval(timer);fill.style.width='100%';
        const d=await resp.json();
        if(d.success) showRes(d); else showErr(d.error||'转写失败');
    }catch(e){clearInterval(timer);showErr('网络错误: '+e.message)}
    finally{setLoading(false);setTimeout(()=>prog.style.display='none',400)}
}

function showRes(d){
    rData=d;out.value=d.text;res.style.display='block';
    const wc=d.text.split(/\s+/).length;
    meta.innerHTML=`<span class="tag">${d.language}</span><span class="tag">${wc} 词</span><span class="tag">${d.text.length} 字符</span>`;
    toastFn('完成','ok');res.scrollIntoView({behavior:'smooth',block:'start'})
}

async function doCopy(){
    try{await navigator.clipboard.writeText(out.value)}catch(_){out.select();document.execCommand('copy')}
    toastFn('已复制','ok')
}

async function doDL(fmt){
    if(!rData)return;
    try{
        const b=await fetch('/download',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:rData.text,segments:rData.segments||[],format:fmt})});
        if(b.ok){
            const blob=await b.blob(),url=URL.createObjectURL(blob),a=document.createElement('a');
            a.href=url;a.download='transcription.'+fmt;document.body.appendChild(a);a.click();
            a.remove();URL.revokeObjectURL(url);toastFn('已下载 '+fmt.toUpperCase(),'ok')
        }
    }catch(_){toastFn('下载失败','fail')}
}

function setLoading(v){btn.disabled=v;spin.style.display=v?'block':'none';btn.querySelector('span').style.display=v?'none':'inline';prog.style.display=v?'block':'none';if(v)fill.style.width='0'}
function showErr(m){err.textContent=m;err.style.display='block'}
function hideErr(){err.style.display='none'}
function toastFn(m,t){toast.textContent=m;toast.className='toast '+(t||'')+' show';setTimeout(()=>toast.classList.remove('show'),2200)}
function fmtSize(b){if(!b)return'0B';const k=1024,s=['B','KB','MB','GB'];return+(b/k**Math.floor(Math.log(b)/Math.log(k))).toFixed(1)+' '+s[Math.floor(Math.log(b)/Math.log(k))]}
</script>
</body>
</html>
